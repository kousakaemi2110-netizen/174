    let currentCat = 'all';

    function renderArticles() {
      const list = document.getElementById('article-list');
      const filtered = currentCat === 'all'
        ? ARTICLES
        : ARTICLES.filter(a => a.cat === currentCat);

      list.innerHTML = '';
      filtered.forEach(article => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.setAttribute('role', 'article');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', article.title);
        card.innerHTML = `
          <div class="article-thumb">
            <img src="${article.image}" alt="${article.title}のサムネイル">
          </div>
          <div class="article-body">
            <div class="article-cat">${catLabel(article.cat)}</div>
            <div class="article-title">${article.title}</div>
            <div class="article-desc">${article.desc}</div>
            <div class="article-meta">${article.date}</div>
          </div>
        `;
        card.addEventListener('click', () => openArticle(article));
        card.addEventListener('keydown', e => { if (e.key === 'Enter') openArticle(article); });
        list.appendChild(card);
      });
    }

    function catLabel(cat) {
      const map = { migraine:'片頭痛', tension:'緊張型', pressure:'気圧頭痛', hormone:'ホルモン', medicine:'薬について' };
      return map[cat] || '';
    }

    function filterCat(btn) {
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderArticles();
    }

    function openArticle(article) {
      document.getElementById('modal-title-header').textContent = article.title;
      document.getElementById('modal-hero').innerHTML = `<img src="${article.image}" alt="${article.title}">`;
      document.getElementById('modal-body').innerHTML = article.body;
      document.getElementById('article-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeArticle() {
      document.getElementById('article-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('DOMContentLoaded', renderArticles);
