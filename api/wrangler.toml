name = "174-api"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "174-db"
database_id = "1f7b4fec-7b01-48ef-815a-39120cecb395"

# ── Stripe / サイト設定（secrets として登録してください） ──────────────────
# 以下のコマンドで各シークレットを登録します:
#
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put STRIPE_SECRET_KEY     # sk_live_... または sk_test_...
#   npx wrangler secret put STRIPE_PRICE_ID       # price_... (¥174/月のサブスクリプション価格ID)
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET # whsec_... (Stripe ダッシュボードのWebhookシークレット)
#   npx wrangler secret put SITE_URL              # https://your-site.example.com (末尾スラッシュなし)
#
# Stripe Webhook の設定:
#   エンドポイントURL: https://174-api.kousakaemi2110.workers.dev/api/stripe/webhook
#   リッスンするイベント: checkout.session.completed, customer.subscription.deleted
