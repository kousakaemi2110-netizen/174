name = "174-api"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "174-db"
database_id = "1f7b4fec-7b01-48ef-815a-39120cecb395"

# Cron Triggers: 週次サマリー（月曜 0:00 UTC = 9:00 JST）& 毎日リマインダー（12:00 UTC = 21:00 JST）
[triggers]
crons = ["0 0 * * 1", "0 12 * * *"]

# ── シークレット設定 ──────────────────────────────────────────────────────────
# 以下のコマンドで各シークレットを登録します:
#
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put STRIPE_SECRET_KEY
#   npx wrangler secret put STRIPE_PRICE_ID
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET
#   npx wrangler secret put SITE_URL
#
# ── Web Push (VAPID) ──
#   1. VAPIDキーを生成: npx web-push generate-vapid-keys --base64url
#   2. 表示された値を登録:
#      npx wrangler secret put VAPID_PUBLIC_KEY   # Public Keyの値
#      npx wrangler secret put VAPID_PRIVATE_KEY  # Private Keyの値
#      npx wrangler secret put VAPID_SUBJECT      # mailto:あなたのメールアドレス
#
# ── D1 テーブル作成 ──
#   npx wrangler d1 execute 174-db --command "CREATE TABLE IF NOT EXISTS push_subscriptions (id TEXT PRIMARY KEY, user_id TEXT NOT NULL, endpoint TEXT UNIQUE NOT NULL, p256dh TEXT NOT NULL, auth TEXT NOT NULL, created_at TEXT NOT NULL);"
#
# ── Stripe Webhook ──
#   エンドポイントURL: https://174-api.kousakaemi2110.workers.dev/api/stripe/webhook
#   イベント: checkout.session.completed, customer.subscription.deleted
