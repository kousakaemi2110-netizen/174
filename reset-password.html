<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7C6FAF">
  <title>パスワードリセット — 174°</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .reset-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 75vh;
      padding: 40px 24px;
    }
    .reset-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
    }
    .reset-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 8px;
    }
    .reset-title {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }
    .reset-msg {
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">174°</a>
  </header>

  <div class="reset-wrap">
    <div class="reset-card">
      <div class="reset-logo">174°</div>
      <div class="reset-title">新しいパスワードを設定</div>

      <div id="reset-msg" class="reset-msg"></div>

      <div id="reset-form">
        <div class="form-group">
          <label class="form-label">新しいパスワード（6文字以上）</label>
          <input class="form-input" id="input-password" type="password"
            placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード（確認）</label>
          <input class="form-input" id="input-password2" type="password"
            placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn btn-primary" id="submit-btn" onclick="submitReset()">パスワードを変更する</button>
      </div>

      <div id="success-view" style="display:none;text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:12px;">✅</div>
        <p style="font-size:0.95rem;color:var(--color-text-muted);margin-bottom:20px;">
          パスワードを変更しました。<br>新しいパスワードでログインしてください。
        </p>
        <a href="settings.html" class="btn btn-primary" style="text-decoration:none;display:block;text-align:center;">
          ログインページへ
        </a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');

    if (!token) {
      document.getElementById('reset-msg').style.color = 'var(--color-danger)';
      document.getElementById('reset-msg').textContent = 'リセットリンクが無効です。';
      document.getElementById('reset-form').style.display = 'none';
    }

    async function submitReset() {
      const password  = document.getElementById('input-password').value;
      const password2 = document.getElementById('input-password2').value;
      const msgEl     = document.getElementById('reset-msg');
      const btn       = document.getElementById('submit-btn');

      msgEl.style.color = 'var(--color-danger)';
      if (password.length < 6) { msgEl.textContent = 'パスワードは6文字以上にしてください'; return; }
      if (password !== password2) { msgEl.textContent = 'パスワードが一致しません'; return; }

      btn.disabled = true; btn.textContent = '変更中…';
      msgEl.textContent = '';

      try {
        await APP.apiRequest('/api/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, password }),
        });
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
      } catch (e) {
        msgEl.textContent = e.message;
        btn.disabled = false; btn.textContent = 'パスワードを変更する';
      }
    }
  </script>
</body>
</html>
