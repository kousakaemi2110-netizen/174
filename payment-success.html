<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7C6FAF">
  <title>決済完了 — 174°</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .success-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 40px 24px;
      gap: 16px;
    }
    .success-icon {
      font-size: 4rem;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-text);
    }
    .success-sub {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      max-width: 300px;
      line-height: 1.6;
    }
    .success-spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sync-status {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">174°</a>
  </header>

  <div class="success-wrap">
    <div class="success-icon">✨</div>
    <div class="success-title">プレミアム登録完了！</div>
    <div class="success-sub">
      ありがとうございます。<br>
      プレミアムプランが有効になりました。
    </div>
    <div class="sync-status" id="sync-status">
      <div class="success-spinner"></div>
      データを同期中…
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    (async function () {
      const params    = new URLSearchParams(location.search);
      const sessionId = params.get('session_id');

      if (APP.isLoggedIn()) {
        if (sessionId) {
          try {
            // セッションIDでStripeを直接確認し、プレミアムを即座に有効化
            // （Webhook到着を待たずに確実にpremium状態を反映できる）
            const result = await APP.apiRequest('/api/stripe/activate-session', {
              method: 'POST',
              body: JSON.stringify({ sessionId }),
            });
            if (result.premium) {
              const s = APP.getSettings();
              s.premium      = true;
              s.premiumSince = result.premiumSince || s.premiumSince || new Date().toISOString();
              APP.saveSettings(s);
            }
          } catch (_) {
            // activate-session 失敗時はsyncで代替
            try { await APP.syncToCloud(); } catch (__) { /* 失敗しても続行 */ }
          }
        } else {
          try {
            await APP.syncToCloud();
          } catch (_) { /* 失敗しても続行 */ }
        }
      }

      const statusEl = document.getElementById('sync-status');
      statusEl.innerHTML = '設定ページに移動します…';

      setTimeout(() => {
        window.location.href = 'settings.html';
      }, 2000);
    })();
  </script>
</body>
</html>
